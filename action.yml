name: CCR Review
description: Review PR changes with configurable prompt architectures and post inline review comments.
author: GitHub Copilot
inputs:
  api-key:
    description: API key for the ASU AIML review provider.
    required: true
  base-url:
    description: Base URL for the ASU AIML query endpoint.
    required: false
    default: https://api-main.aiml.asu.edu/queryV2
  model-provider:
    description: ASU model provider identifier to send with query requests.
    required: false
    default: openai
  model:
    description: ASU model name to use for the review.
    required: true
  github-token:
    description: GitHub token used for pull request file discovery and inline review comments; pull-requests write is required to post comments.
    required: false
  post-inline-comments:
    description: Whether to post short inline comments for mapped findings on pull request changed lines.
    required: false
    default: "false"
  inline-comment-limit:
    description: Maximum number of inline comments to post per pull request run.
    required: false
    default: "10"
  inline-comment-mode:
    description: Inline comment strategy. Use findings for per-finding comments or file-coverage to ensure at least one comment per file with mappable findings.
    required: false
    default: findings
  architecture:
    description: Prompt architecture to run.
    required: false
    default: single-pass
  prompt-root:
    description: Directory that contains the architecture manifests and prompt files.
    required: false
    default: prompts
  base-ref:
    description: Base git ref or commit to diff against.
    required: false
  head-ref:
    description: Head git ref or commit to review.
    required: false
  include-globs:
    description: Comma-separated list of glob patterns to include.
    required: false
    default: "**/*"
  exclude-globs:
    description: Comma-separated list of glob patterns to exclude.
    required: false
    default: "node_modules/**,dist/**,coverage/**,.git/**"
  max-files:
    description: Maximum number of changed files to include in the review payload.
    required: false
    default: "25"
  max-context-chars:
    description: Maximum number of characters to include across file context payloads.
    required: false
    default: "12000"
  temperature:
    description: Sampling temperature for the review model.
    required: false
    default: "0.2"
  request-timeout-ms:
    description: Timeout for the model request in milliseconds.
    required: false
    default: "120000"
outputs:
  summary:
    description: Concise summary extracted from the review output.
  risk-level:
    description: Overall risk level returned by the review.
  finding-count:
    description: Number of review findings in the final report.
  architecture:
    description: The architecture that ran for the review.
  inline-comments-posted:
    description: Number of inline pull request comments posted by this run.
  inline-comments-skipped:
    description: Number of findings skipped while building inline pull request comments.
runs:
  using: node24
  main: dist/index.cjs
branding:
  icon: search
  color: blue