name: CCR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  ccr-review:
    name: CCR Review Action
    runs-on: ubuntu-latest

    # Fork PRs cannot access repo secrets (including ASU_API_KEY).
    if: ${{ github.event.pull_request.draft == false && github.event.pull_request.head.repo.fork == false }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run CCR review action
        uses: ./
        with:
          api-key: ${{ secrets.ASU_API_KEY }}
          github-token: ${{ github.token }}
          model: gpt5_2
          architecture: parallel
          post-inline-comments: "true"
          inline-comment-limit: "10"
          inline-comment-mode: file-coverage
          output-path: CCR.md

      - name: Upload CCR markdown report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ccr-report-${{ github.run_id }}
          path: CCR.md
          if-no-files-found: ignore
