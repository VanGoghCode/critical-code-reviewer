name: CCR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  ccr-review:
    name: CCR Ethical Code Review
    runs-on: ubuntu-latest

    if: ${{ github.event.pull_request.draft == false && github.event.pull_request.head.repo.fork == false }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run CCR Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}

          ASU_API_KEY: ${{ secrets.ASU_API_KEY }}
          ASU_MODEL: gpt5_2
          ASU_BASE_URL: https://api-main.aiml.asu.edu/queryV2
          ASU_MODEL_PROVIDER: asu

          # Architecture: single-pass | iterative | parallel
          ARCHITECTURE: parallel

          POST_INLINE_COMMENTS: "true"
          INLINE_COMMENT_LIMIT: "10"
          MAX_CONTEXT_CHARS: "12000"

        run: |
          python scripts/ccr_reviewer.py

      - name: Upload CCR markdown report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ccr-report-${{ github.run_id }}
          path: CCR.md
          if-no-files-found: ignore
